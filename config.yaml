advanced:
  auto_update_check: true
  debug_mode: false
  developer_mode: false
  telemetry_enabled: false
app:
  developer: OmniMagination
  name: TallySync
  version: 1.0.0
database:
  backup_enabled: true
  backup_interval: 24
  backup_retention: 7
  path: data/tallysync.db
folders:
  assets: app/assets
  backups: backups
  data: data
  exports: exports
  logs: logs
  temp: temp
logging:
  backup_count: 5
  colored_output: true
  console_output: true
  enabled: true
  level: INFO
  log_database: true
  log_folder: logs
  log_pdf: true
  log_sync: true
  log_ui: false
  log_whatsapp: true
  log_xml: true
  max_file_size: 10485760
notifications:
  duration: 5000
  enabled: true
  position: bottom-right
  show_errors: true
  show_sync_complete: true
  show_warnings: true
pdf:
  author: TallySync
  auto_open: true
  creator: TallySync v1.0.0
  default_format: A4
  include_logo: true
  include_watermark: false
  orientation: portrait
  output_folder: exports/pdf
performance:
  cache_enabled: true
  cache_size: 100
  lazy_load: true
  preload_data: false
search:
  cache_results: true
  instant_search: true
  max_results: 100
  search_delay: 300
  validate_on_search: true
security:
  encrypt_config: false
  encrypt_database: false
  require_password: false
  session_timeout: 0
sync:
  auto_sync_enabled: false
  batch_size: 100
  initial_sync_on_startup: false
  max_concurrent_requests: 5
  sync_company: true
  sync_interval: 1440
  sync_inventory: false
  sync_ledgers: true
  sync_reports: false
  sync_schedule: daily
  sync_time: 02:00
  sync_vouchers: true
tally:
  host: localhost
  port: 9000
  protocol: http
  retry_attempts: 2
  retry_delay: 1
  timeout: 60
ui:
  appearance_mode: dark
  color_scheme: blue
  font_family: Segoe UI
  font_size: 13
  height: 720
  min_height: 600
  min_width: 1024
  resizable: true
  sidebar_collapsed_width: 60
  sidebar_width: 240
  theme: dark
  title_font_size: 20
  width: 1280
whatsapp:
  auto_attach: true
  close_after_send: false
  default_message: Please find attached the ledger statement.
  enabled: true
  open_web: true
